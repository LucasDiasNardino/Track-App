spring:
  application:
    name: training-manager

  datasource:
    url: jdbc:postgresql://localhost:5432/training_db
    username: admin   #TODO: mudar secret para variavel de ambiente quando subir em prod
    password: secret
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

