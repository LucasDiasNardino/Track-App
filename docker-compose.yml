services:
  db:
    image: postgres:16
    container_name: training_db
    environment:
      POSTGRES_DB: training_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d training_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: